<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SATA Security - Painel Administrativo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0f1a 0%, #1a2332 100%);
            color: #f8fafc;
            padding: 20px;
            min-height: 100vh;
        }

        .login-screen {
            max-width: 400px;
            margin: 100px auto;
            background: #1a2332;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        .login-title {
            text-align: center;
            color: #0066cc;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .login-subtitle {
            text-align: center;
            color: #c8db00;
            font-size: 0.9rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: #0a0f1a;
            border: 1px solid rgba(148, 163, 184, 0.3);
            border-radius: 8px;
            color: #f8fafc;
            font-size: 1rem;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0066cc, #004d99);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-login:hover {
            box-shadow: 0 0 20px rgba(0, 102, 204, 0.4);
        }

        .dashboard {
            display: none;
            max-width: 1200px;
            margin: 0 auto;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(0, 102, 204, 0.3);
        }

        .dashboard-title {
            font-size: 1.5rem;
            color: #0066cc;
        }

        .btn-refresh {
            padding: 10px 20px;
            background: #1a2332;
            border: 1px solid rgba(148, 163, 184, 0.3);
            color: #f8fafc;
            border-radius: 8px;
            cursor: pointer;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: #1a2332;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        .stat-box h3 {
            color: #94a3b8;
            font-size: 0.85rem;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .stat-value-large {
            font-size: 2rem;
            font-weight: 700;
            color: #c8db00;
        }

        .section {
            background: #1a2332;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        .section-title {
            color: #0066cc;
            font-size: 1.1rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .device-list {
            list-style: none;
        }

        .device-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #0a0f1a;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid #0066cc;
        }

        .device-item.blocked {
            border-left-color: #ef4444;
            opacity: 0.7;
        }

        .device-info h4 {
            color: #f8fafc;
            margin-bottom: 5px;
        }

        .device-info p {
            color: #94a3b8;
            font-size: 0.85rem;
        }

        .device-actions {
            display: flex;
            gap: 10px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.8rem;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-info {
            background: #3b82f6;
            color: white;
        }

        .access-log {
            max-height: 400px;
            overflow-y: auto;
        }

        .log-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
            font-size: 0.9rem;
        }

        .log-time {
            color: #94a3b8;
        }

        .log-device {
            color: #c8db00;
            font-family: monospace;
            font-size: 0.8rem;
        }

        .log-type {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .log-type.access {
            background: rgba(200, 219, 0, 0.2);
            color: #c8db00;
        }

        .log-type.blocked {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .hidden {
            display: none !important;
        }

        .status-online {
            color: #34d399;
        }

        .status-offline {
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <!-- Tela de Login -->
    <div id="loginScreen" class="login-screen">
        <h1 class="login-title">SATA Security</h1>
        <p class="login-subtitle">Painel Administrativo</p>
        
        <div class="input-group">
            <label>Senha de Administrador</label>
            <input type="password" id="adminPassword" placeholder="Digite a senha...">
        </div>
        
        <button class="btn-login" onclick="login()">Acessar Painel</button>
        <p id="loginError" style="color: #ef4444; text-align: center; margin-top: 15px; display: none;">Senha incorreta!</p>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="dashboard">
        <div class="dashboard-header">
            <h2 class="dashboard-title">📊 Painel de Controle - Dispositivos</h2>
            <button class="btn-refresh" onclick="loadData()">🔄 Atualizar</button>
        </div>

        <!-- Estatísticas -->
        <div class="stats-cards">
            <div class="stat-box">
                <h3>Dispositivos Ativos</h3>
                <div class="stat-value-large" id="activeDevices">0</div>
            </div>
            <div class="stat-box">
                <h3>Limite Máximo</h3>
                <div class="stat-value-large">2</div>
            </div>
            <div class="stat-box">
                <h3>Total de Acessos Hoje</h3>
                <div class="stat-value-large" id="todayAccess">0</div>
            </div>
            <div class="stat-box">
                <h3>Tentativas Bloqueadas</h3>
                <div class="stat-value-large" id="blockedAttempts">0</div>
            </div>
        </div>

        <!-- Dispositivos Registrados -->
        <div class="section">
            <h3 class="section-title">💻 Dispositivos Registrados</h3>
            <ul id="deviceList" class="device-list">
                <!-- Preenchido via JS -->
            </ul>
        </div>

        <!-- Histórico de Acesso -->
        <div class="section">
            <h3 class="section-title">📋 Histórico de Acesso (Últimos 50)</h3>
            <div id="accessLog" class="access-log">
                <!-- Preenchido via JS -->
            </div>
        </div>

        <!-- Tentativas Bloqueadas -->
        <div class="section">
            <h3 class="section-title">🚫 Tentativas Bloqueadas</h3>
            <div id="blockedLog" class="access-log">
                <!-- Preenchido via JS -->
            </div>
        </div>
    </div>

    <script>
        // Senha simples (em produção, use algo mais seguro)
        const ADMIN_PASSWORD = 'sata2024';

        function login() {
            const input = document.getElementById('adminPassword').value;
            if (input === ADMIN_PASSWORD) {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('dashboard').style.display = 'block';
                loadData();
            } else {
                document.getElementById('loginError').style.display = 'block';
                setTimeout(() => {
                    document.getElementById('loginError').style.display = 'none';
                }, 3000);
            }
        }

        // Permitir Enter no login
        document.getElementById('adminPassword')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });

        function loadData() {
            // Carregar dados do localStorage do sistema principal
            const devices = JSON.parse(localStorage.getItem('sata_devices') || '[]');
            const accessLog = JSON.parse(localStorage.getItem('sata_access_log') || '[]');
            const blockedLog = JSON.parse(localStorage.getItem('sata_blocked_log') || '[]');
            
            const now = Date.now();
            const oneDay = 24 * 60 * 60 * 1000;
            
            // Estatísticas
            const activeDevices = devices.filter(d => (now - d.lastAccess) < oneDay).length;
            const todayAccess = accessLog.filter(log => {
                const logDate = new Date(log.timestamp);
                const today = new Date();
                return logDate.toDateString() === today.toDateString();
            }).length;
            
            document.getElementById('activeDevices').textContent = activeDevices;
            document.getElementById('todayAccess').textContent = todayAccess;
            document.getElementById('blockedAttempts').textContent = blockedLog.length;
            
            // Lista de dispositivos
            const deviceList = document.getElementById('deviceList');
            deviceList.innerHTML = '';
            
            if (devices.length === 0) {
                deviceList.innerHTML = '<li style="text-align: center; color: #94a3b8; padding: 20px;">Nenhum dispositivo registrado</li>';
            } else {
                devices.forEach((device, index) => {
                    const isOnline = (now - device.lastAccess) < oneDay;
                    const lastAccess = new Date(device.lastAccess).toLocaleString('pt-BR');
                    
                    const li = document.createElement('li');
                    li.className = 'device-item';
                    li.innerHTML = `
                        <div class="device-info">
                            <h4>Dispositivo ${index + 1} <span class="${isOnline ? 'status-online' : 'status-offline'}">●</span></h4>
                            <p><strong>ID:</strong> ${device.id}</p>
                            <p><strong>Primeiro acesso:</strong> ${new Date(device.firstAccess).toLocaleString('pt-BR')}</p>
                            <p><strong>Último acesso:</strong> ${lastAccess}</p>
                            <p><strong>Acessos:</strong> ${device.accessCount || 1}</p>
                        </div>
                        <div class="device-actions">
                            <button class="btn-small btn-danger" onclick="removeDevice('${device.id}')">Remover</button>
                        </div>
                    `;
                    deviceList.appendChild(li);
                });
            }
            
            // Histórico de acesso
            const accessLogDiv = document.getElementById('accessLog');
            accessLogDiv.innerHTML = '';
            
            if (accessLog.length === 0) {
                accessLogDiv.innerHTML = '<div style="text-align: center; color: #94a3b8; padding: 20px;">Nenhum registro</div>';
            } else {
                // Inverter para mostrar mais recentes primeiro
                [...accessLog].reverse().forEach(log => {
                    const div = document.createElement('div');
                    div.className = 'log-item';
                    div.innerHTML = `
                        <span class="log-time">${new Date(log.timestamp).toLocaleString('pt-BR')}</span>
                        <span class="log-device">${log.deviceId.substring(0, 20)}...</span>
                        <span class="log-type access">ACESSO</span>
                    `;
                    accessLogDiv.appendChild(div);
                });
            }
            
            // Tentativas bloqueadas
            const blockedLogDiv = document.getElementById('blockedLog');
            blockedLogDiv.innerHTML = '';
            
            if (blockedLog.length === 0) {
                blockedLogDiv.innerHTML = '<div style="text-align: center; color: #94a3b8; padding: 20px;">Nenhuma tentativa bloqueada</div>';
            } else {
                [...blockedLog].reverse().forEach(log => {
                    const div = document.createElement('div');
                    div.className = 'log-item';
                    div.innerHTML = `
                        <span class="log-time">${new Date(log.timestamp).toLocaleString('pt-BR')}</span>
                        <span class="log-device">${log.deviceId.substring(0, 20)}...</span>
                        <span class="log-type blocked">BLOQUEADO</span>
                    `;
                    blockedLogDiv.appendChild(div);
                });
            }
        }

        function removeDevice(deviceId) {
            if (!confirm('Tem certeza que deseja remover este dispositivo?')) return;
            
            let devices = JSON.parse(localStorage.getItem('sata_devices') || '[]');
            devices = devices.filter(d => d.id !== deviceId);
            localStorage.setItem('sata_devices', JSON.stringify(devices));
            
            loadData();
            alert('Dispositivo removido com sucesso!');
        }

        // Atualizar a cada 30 segundos
        setInterval(() => {
            if (document.getElementById('dashboard').style.display === 'block') {
                loadData();
            }
        }, 30000);
    </script>
</body>
</html>
